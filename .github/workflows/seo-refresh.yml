name: SEO monthly snapshot

on:
  schedule:
    # 02:30 UTC on the 1st of every month
    - cron: '30 2 1 * *'
  workflow_dispatch:
    inputs:
      trends_only:
        description: 'Skip GSC (for testing without credentials)'
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Decode GSC credentials
        if: ${{ !inputs.trends_only && env.GSC_CREDENTIALS_B64 != '' }}
        env:
          GSC_CREDENTIALS_B64: ${{ secrets.GSC_CREDENTIALS_B64 }}
        run: |
          echo "$GSC_CREDENTIALS_B64" | base64 -d > .gsc-credentials.json
          # sanity: verify JSON parses
          node -e "JSON.parse(require('fs').readFileSync('.gsc-credentials.json','utf8'))"

      - name: Fetch Google Trends
        run: npm run seo:trends
        continue-on-error: true

      - name: Fetch Google Search Console
        if: ${{ !inputs.trends_only && hashFiles('.gsc-credentials.json') != '' }}
        run: npm run seo:gsc
        continue-on-error: true

      - name: Refresh keyword-gap.md snapshot
        run: npm run seo:refresh

      - name: Clean up secrets
        if: always()
        run: rm -f .gsc-credentials.json

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore(seo): monthly snapshot refresh"
          title: "SEO monthly snapshot — ${{ github.run_number }}"
          body: |
            Auto-generated by `.github/workflows/seo-refresh.yml`.

            Updated files:
            - `docs/seo-keyword-gap.md` (AUTO-SNAPSHOT block)
            - `docs/data/trends-*.json`
            - (`docs/data/gsc-*.csv` is gitignored; CI artifact only)

            Review the snapshot, note any Striking-distance wins, merge when ready.
          branch: seo/auto-snapshot
          delete-branch: true
          add-paths: |
            docs/seo-keyword-gap.md
            docs/data/trends-*.json
            docs/data/trends-latest.json
            docs/data/trends-keywords.json
