name: Feature Request / 功能建议
description: Suggest a new feature or improvement
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        欢迎提出建议！请描述你希望看到的功能。
        We'd love to hear your ideas!

  - type: textarea
    id: description
    attributes:
      label: Description / 描述
      placeholder: What feature would you like to see?
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation / 动机
      placeholder: Why would this be useful? What problem does it solve?

  - type: dropdown
    id: category
    attributes:
      label: Category / 类别
      options:
        - New content / 新内容
        - New tool / 新工具
        - UX improvement / 体验优化
        - i18n / 新语言支持
        - Accessibility / 无障碍
        - Other / 其他
    validations:
      required: true
